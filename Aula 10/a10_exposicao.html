<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposição — Pandas: Lendo e Explorando Dados · Aula 10</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap}
.badge{background:#334155;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:'Courier New',monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#334155;transform:scale(1.4)}.dot.done{background:#94a3b8;opacity:.6}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:22px 28px;overflow-y:auto;display:none}
.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#334155;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #334155}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:'Courier New',monospace;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.cm{color:#475569;font-style:italic}.fn{color:#fbbf24}
.hl{background:#f8fafc;border-left:3px solid #334155;padding:10px 13px;font-size:12.5px;color:#0f172a;line-height:1.55;margin:10px 0}
.hl strong{color:#1e293b;font-weight:600}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0;color:#1e293b}.nb.pr{background:#334155;color:#fff;border-color:#334155}
.nb.pr:hover{background:#1e293b}.nb:disabled{opacity:.35;pointer-events:none}
.nc{font-size:12px;color:#94a3b8}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:540px){.compare{grid-template-columns:1fr}}
.cs{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.csh{padding:8px 13px;font-size:12px;font-weight:600}
.csb{padding:10px 13px;font-size:12px;color:#64748b;line-height:1.7}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
.tbl th{background:#f8fafc;color:#334155;font-weight:600;padding:7px 11px;text-align:left;border-bottom:2px solid #cbd5e1}
.tbl td{padding:6px 11px;border-bottom:1px solid #f1f5f9;color:#475569}
.tbl tr:hover td{background:#f8fafc}
.qb{margin-bottom:16px}
.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;color:#1e293b;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#94a3b8;background:#f8fafc}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#f1f5f9;color:#334155;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.next-page{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 16px;background:#f8fafc;border:1px solid #cbd5e1;border-radius:10px}
.next-page-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#334155}
.next-page-title{font-size:13px;font-weight:600;color:#1e293b;margin-top:2px}
.next-page-btn{background:#334155;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.next-page-btn:hover{background:#1e293b}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:11px">
      <span class="badge">Aula 10</span>
      <div><div class="hdr-title">Comparando Modelos e Métricas Avançadas · Exposição Dialogada</div><div class="hdr-sub">30 minutos · Projetor · Turma</div></div>
    </div>
    <div class="timer" id="timer">30:00</div>
  </div>
  <div class="dots" id="dots-bar"></div>
  <div class="slide-wrap" id="slide-wrap"></div>
  <div class="nav">
    <button class="nb" id="btn-prev" onclick="goNav(-1)" disabled>← Anterior</button>
    <span class="nc" id="counter">1 / 9</span>

  </div>
</div>
<script>
var cur=0,timerStarted=false,timerInterval=null;
var SLIDES=[
function(){return '<div class="ey">Abertura · 3 min</div><div class="stitle">Comparando modelos — escolhendo o melhor para o problema</div><div class="ssub">Um único modelo raramente é a melhor escolha. Na Aula 09 usamos KNN. Hoje comparamos KNN, Decision Tree e Random Forest no mesmo problema para entender trade-offs.</div><div class="cards"><div class="card ac"><div class="ci">⚖️</div><div class="ct">Por que comparar?</div><div class="cb">Modelos diferentes têm vieses diferentes. KNN é preguiçoso mas interpretável. Decision Tree é explicável. Random Forest é robusto. A escolha depende do problema.</div></div><div class="card ac"><div class="ci">🔄</div><div class="ct">Cross-validation</div><div class="cb">Avaliar em um único split pode ser enganoso. Cross-validation divide os dados em K partes e avalia K vezes — resultado mais confiável e menos dependente do split.</div></div><div class="card ac"><div class="ci">📈</div><div class="ct">Métricas avançadas</div><div class="cb">Para além de acurácia: curva ROC, AUC, precisão-recall. Essenciais quando as classes sao desbalanceadas ou quando o custo de erros é assimétrico.</div></div><div class="card"><div class="ci">💬</div><div class="ct">Atividade de abertura</div><div class="cb"><em>"Em medicina, o que é pior: diagnosticar alguém saudável como doente, ou deixar passar um doente como saudável? Como isso muda a métrica que priorizamos?"</em></div></div></div>';},
function(){return '<div class="ey">Cross-validation · 4 min</div><div class="stitle">Cross-validation — avaliação mais confiável</div><div class="ssub">Um único train_test_split pode ter sorte ou azar dependendo de quais exemplos caem em cada parte. Cross-validation repete a avaliação K vezes para uma estimativa robusta.</div><div class="cw"><div class="ch"><span>Python · K-Fold Cross-Validation</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">from</span> <span class="p">sklearn.model_selection</span> <span class="k">import</span> <span class="fn">cross_val_score</span>\n<span class="k">from</span> <span class="p">sklearn.neighbors</span>    <span class="k">import</span> <span class="fn">KNeighborsClassifier</span>\n<span class="k">from</span> <span class="p">sklearn.datasets</span>     <span class="k">import</span> <span class="fn">load_iris</span>\n\n<span class="p">X</span>, <span class="p">y</span> = <span class="fn">load_iris</span>(<span class="p">return_X_y</span>=<span class="v">True</span>)\n\n<span class="p">knn</span>    = <span class="fn">KNeighborsClassifier</span>(<span class="p">n_neighbors</span>=<span class="v">5</span>)\n<span class="p">scores</span> = <span class="fn">cross_val_score</span>(<span class="p">knn</span>, <span class="p">X</span>, <span class="p">y</span>, <span class="p">cv</span>=<span class="v">5</span>)\n\n<span class="fn">print</span>(<span class="s">f"Scores: {scores.round(3)}"</span>)\n<span class="fn">print</span>(<span class="s">f"Média: {scores.mean():.3f} ± {scores.std():.3f}"</span>)</pre></div><div class="hl"><strong>Média ± desvio padrão</strong> é a forma correta de reportar acurácia com cross-validation. Um modelo com 95% ± 1% é mais confiável que outro com 96% ± 8% — o segundo é muito instável dependendo do split.</div>';},
function(){return '<div class="ey">Comparando · 4 min</div><div class="stitle">Comparando 3 modelos com a mesma API</div><div class="ssub">A beleza do Scikit-learn: qualquer modelo usa .fit() e .predict(). Para comparar modelos, apenas trocamos a classe — o resto do código permanece igual.</div><div class="cw"><div class="ch"><span>Python · Comparando KNN, Decision Tree e Random Forest</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">from</span> <span class="p">sklearn.tree</span>   <span class="k">import</span> <span class="fn">DecisionTreeClassifier</span>\n<span class="k">from</span> <span class="p">sklearn.ensemble</span> <span class="k">import</span> <span class="fn">RandomForestClassifier</span>\n\n<span class="p">modelos</span> = {\n    <span class="s">"KNN"</span>          : <span class="fn">KNeighborsClassifier</span>(<span class="p">n_neighbors</span>=<span class="v">5</span>),\n    <span class="s">"Decision Tree"</span>: <span class="fn">DecisionTreeClassifier</span>(<span class="p">random_state</span>=<span class="v">42</span>),\n    <span class="s">"Random Forest"</span>: <span class="fn">RandomForestClassifier</span>(<span class="p">n_estimators</span>=<span class="v">100</span>, <span class="p">random_state</span>=<span class="v">42</span>),\n}\n\n<span class="k">for</span> <span class="p">nome</span>, <span class="p">modelo</span> <span class="k">in</span> <span class="p">modelos</span>.<span class="fn">items</span>():\n    <span class="p">scores</span> = <span class="fn">cross_val_score</span>(<span class="p">modelo</span>, <span class="p">X</span>, <span class="p">y</span>, <span class="p">cv</span>=<span class="v">5</span>)\n    <span class="fn">print</span>(<span class="s">f"{nome:15} {scores.mean():.3f} ± {scores.std():.3f}"</span>)</pre></div><div class="hl"><strong>Esse padrão — dicionário de modelos + loop — é usado em todo projeto de ML real.</strong> Facilita adicionar novos modelos, comparar resultados e manter o código limpo.</div>';},
function(){return '<div class="ey">Overfitting · 3 min</div><div class="stitle">Overfitting e Underfitting</div><div class="ssub">Dois erros clássicos em ML. Overfitting: o modelo decorou os dados de treino e nao generaliza. Underfitting: o modelo é simples demais e nao captura os padrões.</div><div class="compare"><div class="cs"><div class="csh" style="background:#fef2f2;color:#991b1b">Overfitting</div><div class="csb">Treino muito alto, teste muito baixo.<br>Modelo muito complexo para os dados.<br><br>Exemplos: Decision Tree sem limite de profundidade, KNN com K=1.<br><br>Solucao: limitar complexidade, mais dados, regularizacao.</div></div><div class="cs"><div class="csh" style="background:#fef9c3;color:#713f12">Underfitting</div><div class="csb">Treino e teste ambos baixos.<br>Modelo muito simples para os dados.<br><br>Exemplos: KNN com K muito alto, modelo linear em dados nao-lineares.<br><br>Solucao: modelo mais complexo, mais features.</div></div></div><div class="hl"><strong>O ponto ideal é o equilíbrio:</strong> modelo complexo o suficiente para capturar padrões, mas simples o suficiente para generalizar. Cross-validation ajuda a encontrar esse ponto.</div>';},
function(){return '<div class="ey">Feature importance · 3 min</div><div class="stitle">Feature importance — o que o modelo aprendeu</div><div class="ssub">Modelos baseados em árvore revelam quais features foram mais importantes para as previsões. Isso é interpretabilidade — saber o porquê da decisão.</div><div class="cw"><div class="ch"><span>Python · Feature importance do Random Forest</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">from</span> <span class="p">sklearn.datasets</span>  <span class="k">import</span> <span class="fn">load_iris</span>\n<span class="k">from</span> <span class="p">sklearn.ensemble</span>  <span class="k">import</span> <span class="fn">RandomForestClassifier</span>\n<span class="k">from</span> <span class="p">sklearn.model_selection</span> <span class="k">import</span> <span class="fn">train_test_split</span>\n\n<span class="p">X</span>, <span class="p">y</span> = <span class="fn">load_iris</span>(<span class="p">return_X_y</span>=<span class="v">True</span>)\n<span class="p">iris</span> = <span class="fn">load_iris</span>()\n<span class="p">X_tr</span>, <span class="p">X_te</span>, <span class="p">y_tr</span>, <span class="p">y_te</span> = <span class="fn">train_test_split</span>(<span class="p">X</span>, <span class="p">y</span>, <span class="p">random_state</span>=<span class="v">42</span>)\n\n<span class="p">rf</span> = <span class="fn">RandomForestClassifier</span>(<span class="p">n_estimators</span>=<span class="v">100</span>, <span class="p">random_state</span>=<span class="v">42</span>)\n<span class="p">rf</span>.<span class="fn">fit</span>(<span class="p">X_tr</span>, <span class="p">y_tr</span>)\n\n<span class="k">for</span> <span class="p">feat</span>, <span class="p">imp</span> <span class="k">in</span> <span class="fn">zip</span>(<span class="p">iris</span>.<span class="fn">feature_names</span>, <span class="p">rf</span>.<span class="fn">feature_importances_</span>):\n    <span class="fn">print</span>(<span class="s">f"{feat[:20]:20} {imp:.3f}"</span>)</pre></div><div class="hl"><strong>feature_importances_</strong> soma 1.0. Petal length e petal width dominam no Iris — confirma o que vimos no groupby da Aula 09. Em problemas reais, isso guia a coleta de dados futura.</div>';},
function(){return '<div class="ey">Pipeline · 3 min</div><div class="stitle">Pipeline — encadeando pré-processamento e modelo</div><div class="ssub">Em projetos reais, antes de treinar normaliza-se os dados. O Pipeline garante que a normalização use apenas os dados de treino — evitando vazamento de dados (data leakage).</div><div class="cw"><div class="ch"><span>Python · Pipeline com StandardScaler + KNN</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">from</span> <span class="p">sklearn.pipeline</span>    <span class="k">import</span> <span class="fn">Pipeline</span>\n<span class="k">from</span> <span class="p">sklearn.preprocessing</span> <span class="k">import</span> <span class="fn">StandardScaler</span>\n\n<span class="p">pipe</span> = <span class="fn">Pipeline</span>([\n    (<span class="s">"scaler"</span>, <span class="fn">StandardScaler</span>()),\n    (<span class="s">"knn"</span>,    <span class="fn">KNeighborsClassifier</span>(<span class="p">n_neighbors</span>=<span class="v">5</span>))\n])\n\n<span class="p">scores</span> = <span class="fn">cross_val_score</span>(<span class="p">pipe</span>, <span class="p">X</span>, <span class="p">y</span>, <span class="p">cv</span>=<span class="v">5</span>)\n<span class="fn">print</span>(<span class="s">f"KNN + Scaler: {scores.mean():.3f} ± {scores.std():.3f}"</span>)\n\n<span class="cm"># Pipeline também funciona com predict</span>\n<span class="p">pipe</span>.<span class="fn">fit</span>(<span class="p">X_tr</span>, <span class="p">y_tr</span>)\n<span class="fn">print</span>(<span class="p">pipe</span>.<span class="fn">score</span>(<span class="p">X_te</span>, <span class="p">y_te</span>))</pre></div><div class="hl"><strong>Data leakage:</strong> normalizar antes do split usa estatísticas do teste para escalar o treino — contaminação que infla artificialmente a acurácia. Pipeline evita isso automaticamente.</div>';},
function(){return '<div class="ey">Próximos passos · 3 min</div><div class="stitle">O que vem depois — continuando em ML</div><div class="ssub">Este curso cobriu os fundamentos. Existe um vasto universo de técnicas, ferramentas e aplicações. Aqui estao os próximos passos mais naturais.</div><div class="cards"><div class="card ac"><div class="ci">📊</div><div class="ct">Regressao</div><div class="cb">Prever valores contínuos em vez de classes. LinearRegression, Ridge, SVR. Métricas: MAE, RMSE, R².</div></div><div class="card ac"><div class="ci">🌲</div><div class="ct">Ensemble</div><div class="cb">XGBoost, LightGBM, Gradient Boosting. Os campeões do Kaggle. Construídos sobre árvores como o Random Forest.</div></div><div class="card ac"><div class="ci">🧠</div><div class="ct">Deep Learning</div><div class="cb">Redes neurais com TensorFlow ou PyTorch. Para imagens, texto e séries temporais. Requer mais dados e poder computacional.</div></div><div class="card ac"><div class="ci">🔧</div><div class="ct">Feature Engineering</div><div class="cb">Criar novas features a partir das existentes. A parte mais artística do ML — e geralmente o que mais melhora os resultados.</div></div></div>';},
function(){return '<div class="ey">Quiz · 3 min</div><div class="stitle">Verificação de aprendizagem</div><div class="ssub">Turma responde junto.</div><div class="qb"><div class="qa">1. Por que cross-validation é melhor que um único train_test_split?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>A</span>Porque é mais rápido de executar</div><div class="qop" onclick="ansQ(this,\'c\',\'f0\')"><span>B</span>Porque reduz a dependência de um único split aleatório e dá estimativa mais robusta</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>C</span>Porque usa todos os dados para treino</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>D</span>Porque evita overfitting automaticamente</div></div><div class="qfb" id="f0" style="background:#f0fdf4;color:#15803d">Correto! Um único split pode ter sorte ou azar — os exemplos que caem no teste influenciam muito o resultado. Cross-validation repete a avaliação K vezes e reporta média e desvio padrão.</div></div><div class="qb"><div class="qa">2. O que é overfitting e como identificá-lo?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>A</span>Modelo com acurácia baixa em treino e teste</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>B</span>Modelo que demora muito para treinar</div><div class="qop" onclick="ansQ(this,\'c\',\'f1\')"><span>C</span>Modelo com acurácia muito alta no treino e significativamente menor no teste</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>D</span>Modelo que usa muitas features</div></div><div class="qfb" id="f1" style="background:#f0fdf4;color:#15803d">Correto! Overfitting é quando o modelo decorou o treino mas nao generaliza. A diferença grande entre treino (ex: 99%) e teste (ex: 72%) é o sinal clássico.</div></div>';},

function buildDots(){var b=document.getElementById('dots-bar');b.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('span');d.className='dot'+(i===0?' active':'');(function(idx){d.onclick=function(){goTo(idx);};})(i);b.appendChild(d);if(i<SLIDES.length-1){var s=document.createElement('div');s.className='dsep';b.appendChild(s);}}}
function buildSlides(){var w=document.getElementById('slide-wrap');w.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='sl-'+i;d.innerHTML=SLIDES[i]();w.appendChild(d);}}
function goTo(i){document.getElementById('sl-'+cur).classList.remove('active');var dots=document.querySelectorAll('.dot');dots[cur].classList.remove('active');if(i>cur)dots[cur].classList.add('done');cur=i;var el=document.getElementById('sl-'+cur);el.innerHTML=SLIDES[cur]();el.classList.add('active');dots[cur].classList.add('active');dots[cur].classList.remove('done');document.getElementById('btn-prev').disabled=(cur===0);var bn=document.getElementById('btn-next');bn.disabled=(cur===SLIDES.length-1);bn.textContent=cur===SLIDES.length-1?'Finalizar':'Próximo →';document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;if(!timerStarted){timerStarted=true;startTimer();}}
function goNav(d){var n=cur+d;if(n>=0&&n<SLIDES.length)goTo(n);}
function startTimer(){var r=30*60;var el=document.getElementById('timer');timerInterval=setInterval(function(){r--;var m=Math.floor(r/60),s=r%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(r<=300)el.className='timer warn';if(r<=60)el.className='timer danger';if(r<=0){clearInterval(timerInterval);el.textContent='00:00';}},1000);}
function ansQ(el,t,id){var qb=el.closest('.qb');qb.querySelectorAll('.qop').forEach(function(o){if(o===el)o.classList.add(t==='c'?'correct':'wrong');else o.classList.add('dimmed');});var fb=document.getElementById(id);if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='Nao exatamente — relembre cross-validation e overfitting.';}fb.style.display='block';}
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;
</script>
