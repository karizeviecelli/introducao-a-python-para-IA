<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposição — Visualização com Matplotlib · Aula 08</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap}
.badge{background:#be185d;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:'Courier New',monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#be185d;transform:scale(1.4)}.dot.done{background:#f9a8d4;opacity:.6}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:22px 28px;overflow-y:auto;display:none}
.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#be185d;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #be185d}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:'Courier New',monospace;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.cm{color:#475569;font-style:italic}.fn{color:#fbbf24}
.hl{background:#fdf2f8;border-left:3px solid #be185d;padding:10px 13px;font-size:12.5px;color:#500724;line-height:1.55;margin:10px 0}
.hl strong{color:#9d174d;font-weight:600}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0;color:#1e293b}.nb.pr{background:#be185d;color:#fff;border-color:#be185d}
.nb.pr:hover{background:#9d174d}.nb:disabled{opacity:.35;pointer-events:none}
.nc{font-size:12px;color:#94a3b8}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:540px){.compare{grid-template-columns:1fr}}
.cs{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.csh{padding:8px 13px;font-size:12px;font-weight:600}
.csb{padding:10px 13px;font-size:12px;color:#64748b;line-height:1.7}
.qb{margin-bottom:16px}
.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;color:#1e293b;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#f9a8d4;background:#fdf2f8}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#fce7f3;color:#be185d;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.next-page{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 16px;background:#fdf2f8;border:1px solid #fbcfe8;border-radius:10px}
.next-page-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#be185d}
.next-page-title{font-size:13px;font-weight:600;color:#1e293b;margin-top:2px}
.next-page-btn{background:#be185d;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.next-page-btn:hover{background:#9d174d}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:11px">
      <span class="badge">Aula 08</span>
      <div><div class="hdr-title">Visualização com Matplotlib · Exposição Dialogada</div><div class="hdr-sub">30 minutos · Projetor · Turma</div></div>

<script>
var cur=0,timerStarted=false,timerInterval=null;
var SLIDES=[
function(){return '<div class="ey">Abertura · 3 min</div><div class="stitle">Matplotlib — dando forma visual aos dados</div><div class="ssub">Tabelas de números sao difíceis de interpretar. Um gráfico bem feito comunica em segundos o que levaria minutos para ler em uma tabela. Matplotlib é a fundação de visualização em Python.</div><div class="cards"><div class="card ac"><div class="ci">📊</div><div class="ct">Por que visualizar?</div><div class="cb">O cérebro humano processa padrões visuais muito mais rápido que texto. Outliers, tendências e correlações que passariam despercebidos em tabelas ficam óbvios em gráficos.</div></div><div class="card ac"><div class="ci">🔧</div><div class="ct">Matplotlib é a base</div><div class="cb">Seaborn, Pandas plot e Plotly sao construídos sobre Matplotlib. Entender a estrutura de figura e eixos de Matplotlib facilita usar qualquer biblioteca de visualização.</div></div><div class="card ac"><div class="ci">🐼</div><div class="ct">Pandas + Matplotlib</div><div class="cb">DataFrames têm o método .plot() que usa Matplotlib por baixo. Em muitos casos, df.plot() basta — sem precisar escrever código Matplotlib diretamente.</div></div><div class="card"><div class="ci">💬</div><div class="ct">Atividade de abertura</div><div class="cb"><em>"Imaginem que vendas cresceram 200% em janeiro. Como isso aparece em uma tabela de números? E em um gráfico de linhas? Qual é mais rápido de interpretar?"</em></div></div></div>';},
function(){return '<div class="ey">Estrutura · 3 min</div><div class="stitle">Figure e Axes — a anatomia de um gráfico</div><div class="ssub">Matplotlib organiza gráficos em dois níveis: a Figure é a tela inteira; o Axes é o gráfico dentro da tela. Entender essa hierarquia evita a maioria dos erros de formatação.</div><div class="cw"><div class="ch"><span>Python · Estrutura básica</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">import</span> <span class="p">matplotlib.pyplot</span> <span class="k">as</span> <span class="p">plt</span>\n<span class="k">import</span> <span class="p">numpy</span> <span class="k">as</span> <span class="p">np</span>\n\n<span class="cm"># Forma explícita — recomendada para controle total</span>\n<span class="p">fig</span>, <span class="p">ax</span> = <span class="p">plt</span>.<span class="fn">subplots</span>(<span class="p">figsize</span>=(<span class="v">8</span>, <span class="v">4</span>))\n\n<span class="p">ax</span>.<span class="fn">plot</span>([<span class="v">1</span>, <span class="v">2</span>, <span class="v">3</span>, <span class="v">4</span>], [<span class="v">10</span>, <span class="v">20</span>, <span class="v">15</span>, <span class="v">25</span>])\n<span class="p">ax</span>.<span class="fn">set_title</span>(<span class="s">"Meu primeiro gráfico"</span>)\n<span class="p">ax</span>.<span class="fn">set_xlabel</span>(<span class="s">"Mês"</span>)\n<span class="p">ax</span>.<span class="fn">set_ylabel</span>(<span class="s">"Vendas"</span>)\n<span class="p">plt</span>.<span class="fn">tight_layout</span>()\n<span class="p">plt</span>.<span class="fn">show</span>()</pre></div><div class="hl"><strong>fig, ax = plt.subplots()</strong> é a forma preferida de criar gráficos. Separa explicitamente a figura do eixo, permite múltiplos subplots e deixa o código mais claro. O <code>figsize=(largura, altura)</code> define o tamanho em polegadas.</div>';},
function(){return '<div class="ey">Linha · 3 min</div><div class="stitle">Gráfico de linha — tendências ao longo do tempo</div><div class="ssub">Use para dados contínuos e séries temporais. Excelente para mostrar evolução, tendências e comparar múltiplas séries no mesmo gráfico.</div><div class="cw"><div class="ch"><span>Python · Gráfico de linha</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="p">meses</span> = [<span class="s">"Jan"</span>, <span class="s">"Fev"</span>, <span class="s">"Mar"</span>, <span class="s">"Abr"</span>, <span class="s">"Mai"</span>, <span class="s">"Jun"</span>]\n<span class="p">vendas_a</span> = [<span class="v">120</span>, <span class="v">145</span>, <span class="v">132</span>, <span class="v">168</span>, <span class="v">180</span>, <span class="v">210</span>]\n<span class="p">vendas_b</span> = [<span class="v">100</span>, <span class="v">110</span>, <span class="v">105</span>, <span class="v">115</span>, <span class="v">130</span>, <span class="v">140</span>]\n\n<span class="p">fig</span>, <span class="p">ax</span> = <span class="p">plt</span>.<span class="fn">subplots</span>(<span class="p">figsize</span>=(<span class="v">8</span>, <span class="v">4</span>))\n\n<span class="p">ax</span>.<span class="fn">plot</span>(<span class="p">meses</span>, <span class="p">vendas_a</span>, <span class="p">marker</span>=<span class="s">"o"</span>, <span class="p">label</span>=<span class="s">"Produto A"</span>, <span class="p">color</span>=<span class="s">"#be185d"</span>)\n<span class="p">ax</span>.<span class="fn">plot</span>(<span class="p">meses</span>, <span class="p">vendas_b</span>, <span class="p">marker</span>=<span class="s">"s"</span>, <span class="p">label</span>=<span class="s">"Produto B"</span>, <span class="p">color</span>=<span class="s">"#0d9488"</span>)\n\n<span class="p">ax</span>.<span class="fn">set_title</span>(<span class="s">"Vendas por Produto — 1º Semestre"</span>)\n<span class="p">ax</span>.<span class="fn">set_ylabel</span>(<span class="s">"Unidades vendidas"</span>)\n<span class="p">ax</span>.<span class="fn">legend</span>()\n<span class="p">ax</span>.<span class="fn">grid</span>(<span class="p">alpha</span>=<span class="v">0.3</span>)\n<span class="p">plt</span>.<span class="fn">show</span>()</pre></div><div class="hl"><strong>marker=</strong> adiciona marcadores nos pontos. Principais: <code>"o"</code> (círculo), <code>"s"</code> (quadrado), <code>"^"</code> (triângulo). <code>grid(alpha=0.3)</code> adiciona grade sutil. Sempre inclua legend() quando houver múltiplas séries.</div>';},
function(){return '<div class="ey">Barras · 3 min</div><div class="stitle">Gráfico de barras — comparando categorias</div><div class="ssub">Use para comparar valores entre categorias discretas. Barras verticais para poucos itens, horizontais quando os rótulos sao longos ou há muitas categorias.</div><div class="cw"><div class="ch"><span>Python · Barras verticais e horizontais</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="p">produtos</span> = [<span class="s">"Notebook"</span>, <span class="s">"Mouse"</span>, <span class="s">"Teclado"</span>, <span class="s">"Monitor"</span>]\n<span class="p">vendas</span>   = [<span class="v">45</span>, <span class="v">120</span>, <span class="v">80</span>, <span class="v">30</span>]\n<span class="p">cores</span>    = [<span class="s">"#be185d"</span>, <span class="s">"#0d9488"</span>, <span class="s">"#1e40af"</span>, <span class="s">"#d97706"</span>]\n\n<span class="p">fig</span>, (<span class="p">ax1</span>, <span class="p">ax2</span>) = <span class="p">plt</span>.<span class="fn">subplots</span>(<span class="v">1</span>, <span class="v">2</span>, <span class="p">figsize</span>=(<span class="v">10</span>, <span class="v">4</span>))\n\n<span class="cm"># Vertical</span>\n<span class="p">ax1</span>.<span class="fn">bar</span>(<span class="p">produtos</span>, <span class="p">vendas</span>, <span class="p">color</span>=<span class="p">cores</span>)\n<span class="p">ax1</span>.<span class="fn">set_title</span>(<span class="s">"Vertical"</span>)\n\n<span class="cm"># Horizontal</span>\n<span class="p">ax2</span>.<span class="fn">barh</span>(<span class="p">produtos</span>, <span class="p">vendas</span>, <span class="p">color</span>=<span class="p">cores</span>)\n<span class="p">ax2</span>.<span class="fn">set_title</span>(<span class="s">"Horizontal"</span>)\n\n<span class="p">plt</span>.<span class="fn">tight_layout</span>()\n<span class="p">plt</span>.<span class="fn">show</span>()</pre></div><div class="hl"><strong>plt.subplots(1, 2)</strong> cria dois gráficos lado a lado. O primeiro número é linhas, o segundo é colunas. <code>tight_layout()</code> evita sobreposição automática dos elementos.</div>';},
function(){return '<div class="ey">Histograma · 3 min</div><div class="stitle">Histograma — distribuição de uma variável</div><div class="ssub">Histogramas mostram como os valores se distribuem. Essencial antes de qualquer modelo — você precisa saber se os dados sao simétricos, assimétricos ou bimodais.</div><div class="cw"><div class="ch"><span>Python · Histograma</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">import</span> <span class="p">numpy</span> <span class="k">as</span> <span class="p">np</span>\n\n<span class="p">np</span>.<span class="fn">random</span>.<span class="fn">seed</span>(<span class="v">42</span>)\n<span class="p">notas</span> = <span class="p">np</span>.<span class="fn">random</span>.<span class="fn">normal</span>(<span class="p">loc</span>=<span class="v">7.0</span>, <span class="p">scale</span>=<span class="v">1.5</span>, <span class="p">size</span>=<span class="v">200</span>)\n<span class="p">notas</span> = <span class="p">np</span>.<span class="fn">clip</span>(<span class="p">notas</span>, <span class="v">0</span>, <span class="v">10</span>)  <span class="cm"># limitar entre 0 e 10</span>\n\n<span class="p">fig</span>, <span class="p">ax</span> = <span class="p">plt</span>.<span class="fn">subplots</span>(<span class="p">figsize</span>=(<span class="v">7</span>, <span class="v">4</span>))\n\n<span class="p">ax</span>.<span class="fn">hist</span>(<span class="p">notas</span>, <span class="p">bins</span>=<span class="v">20</span>, <span class="p">color</span>=<span class="s">"#be185d"</span>, <span class="p">edgecolor</span>=<span class="s">"white"</span>, <span class="p">alpha</span>=<span class="v">0.85</span>)\n<span class="p">ax</span>.<span class="fn">axvline</span>(<span class="p">notas</span>.<span class="fn">mean</span>(), <span class="p">color</span>=<span class="s">"black"</span>, <span class="p">linestyle</span>=<span class="s">"--"</span>, <span class="p">label</span>=<span class="s">f"Média: {notas.mean():.1f}"</span>)\n<span class="p">ax</span>.<span class="fn">set_title</span>(<span class="s">"Distribuição das Notas"</span>)\n<span class="p">ax</span>.<span class="fn">legend</span>()\n<span class="p">plt</span>.<span class="fn">show</span>()</pre></div><div class="hl"><strong>bins=</strong> controla a granularidade. Poucos bins escondem detalhes; muitos bins criam ruído. Regra prática: comece com <code>bins=20</code> e ajuste. <code>axvline()</code> adiciona uma linha vertical — ótimo para marcar média ou mediana.</div>';},
function(){return '<div class="ey">Scatter · 3 min</div><div class="stitle">Scatter plot — relação entre duas variáveis</div><div class="ssub">Use para investigar correlação entre duas variáveis numéricas. O scatter plot é o primeiro gráfico que se faz ao suspeitar de uma relação entre colunas — antes de calcular qualquer coeficiente.</div><div class="cw"><div class="ch"><span>Python · Scatter plot</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="p">np</span>.<span class="fn">random</span>.<span class="fn">seed</span>(<span class="v">42</span>)\n<span class="p">horas_estudo</span> = <span class="p">np</span>.<span class="fn">random</span>.<span class="fn">uniform</span>(<span class="v">1</span>, <span class="v">8</span>, <span class="v">50</span>)\n<span class="p">nota</span>         = <span class="p">horas_estudo</span> * <span class="v">1.1</span> + <span class="p">np</span>.<span class="fn">random</span>.<span class="fn">normal</span>(<span class="v">0</span>, <span class="v">1</span>, <span class="v">50</span>)\n<span class="p">nota</span>         = <span class="p">np</span>.<span class="fn">clip</span>(<span class="p">nota</span>, <span class="v">0</span>, <span class="v">10</span>)\n\n<span class="p">fig</span>, <span class="p">ax</span> = <span class="p">plt</span>.<span class="fn">subplots</span>(<span class="p">figsize</span>=(<span class="v">7</span>, <span class="v">4</span>))\n\n<span class="p">ax</span>.<span class="fn">scatter</span>(<span class="p">horas_estudo</span>, <span class="p">nota</span>, <span class="p">color</span>=<span class="s">"#be185d"</span>, <span class="p">alpha</span>=<span class="v">0.6</span>, <span class="p">edgecolors</span>=<span class="s">"white"</span>)\n<span class="p">ax</span>.<span class="fn">set_xlabel</span>(<span class="s">"Horas de estudo"</span>)\n<span class="p">ax</span>.<span class="fn">set_ylabel</span>(<span class="s">"Nota"</span>)\n<span class="p">ax</span>.<span class="fn">set_title</span>(<span class="s">"Horas de estudo vs Nota"</span>)\n<span class="p">plt</span>.<span class="fn">show</span>()</pre></div><div class="hl"><strong>alpha=0.6</strong> torna os pontos semitransparentes — essencial quando há sobreposição. Com muitos pontos sobrepostos sem alpha, parece que há menos dados do que realmente existem.</div>';},
function(){return '<div class="ey">Pandas plot · 3 min</div><div class="stitle">df.plot() — Matplotlib integrado ao Pandas</div><div class="ssub">Para análises rápidas, o método <code>.plot()</code> do DataFrame evita escrever código Matplotlib. É um atalho poderoso — especialmente com dados agrupados por groupby.</div><div class="cw"><div class="ch"><span>Python · Pandas .plot() direto no DataFrame</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">import</span> <span class="p">pandas</span> <span class="k">as</span> <span class="p">pd</span>\n\n<span class="p">vendas</span> = <span class="p">pd</span>.<span class="fn">DataFrame</span>({\n    <span class="s">"mes"</span>      : [<span class="s">"Jan"</span>, <span class="s">"Fev"</span>, <span class="s">"Mar"</span>, <span class="s">"Abr"</span>],\n    <span class="s">"notebook"</span> : [<span class="v">20</span>, <span class="v">25</span>, <span class="v">22</span>, <span class="v">30</span>],\n    <span class="s">"mouse"</span>    : [<span class="v">50</span>, <span class="v">60</span>, <span class="v">55</span>, <span class="v">70</span>]\n}).set_index(<span class="s">"mes"</span>)\n\n<span class="cm"># Linha — evolucao por mes</span>\n<span class="p">vendas</span>.<span class="fn">plot</span>(<span class="p">figsize</span>=(<span class="v">8</span>, <span class="v">4</span>), <span class="p">marker</span>=<span class="s">"o"</span>, <span class="p">title</span>=<span class="s">"Evolução Mensal"</span>)\n\n<span class="cm"># Barra agrupada — comparar produtos por mes</span>\n<span class="p">vendas</span>.<span class="fn">plot</span>.<span class="fn">bar</span>(<span class="p">figsize</span>=(<span class="v">8</span>, <span class="v">4</span>), <span class="p">title</span>=<span class="s">"Vendas por Mês"</span>)\n\n<span class="p">plt</span>.<span class="fn">show</span>()</pre></div><div class="hl"><strong>set_index("mes")</strong> define a coluna mês como índice do DataFrame. Com isso, df.plot() usa os meses automaticamente como eixo X. É o padrão para séries temporais no Pandas.</div>';},
function(){return '<div class="ey">Quiz · 3 min</div><div class="stitle">Verificação de aprendizagem</div><div class="ssub">Turma responde junto.</div><div class="qb"><div class="qa">1. Qual tipo de gráfico é mais adequado para mostrar a distribuicao de uma variável numérica como salário?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>A</span>Gráfico de linha — mostra a evolucao</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>B</span>Gráfico de barras — compara categorias</div><div class="qop" onclick="ansQ(this,\'c\',\'f0\')"><span>C</span>Histograma — mostra como os valores se distribuem</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>D</span>Scatter plot — mostra correlacao</div></div><div class="qfb" id="f0" style="background:#f0fdf4;color:#15803d">Correto! Histograma agrupa valores em intervalos (bins) e mostra a frequência de cada intervalo. É o gráfico para entender distribuicao de uma variável numérica contínua.</div></div><div class="qb"><div class="qa">2. O que fig, ax = plt.subplots() retorna?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>A</span>Apenas a figura — ax é criado automaticamente</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>B</span>Uma lista de gráficos prontos</div><div class="qop" onclick="ansQ(this,\'c\',\'f1\')"><span>C</span>A figura (tela) e o eixo (área do gráfico) separados</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>D</span>Dois objetos idênticos</div></div><div class="qfb" id="f1" style="background:#f0fdf4;color:#15803d">Correto! Figure é o container externo (a tela). Axes é o gráfico dentro da figura. Separar os dois permite controle total — múltiplos subplots, tamanhos diferentes, formatacoes independentes.</div></div>';},
function(){return '<div class="ey">Encerramento · 1 min</div><div class="stitle">Recapitulando</div><div class="ssub">O que aprendemos e o que faremos agora.</div><div class="rl"><div class="ri"><div class="rn">1</div><div class="rt"><strong>fig, ax = plt.subplots()</strong> é a forma correta. Figure é a tela, Axes é o gráfico. figsize controla o tamanho.</div></div><div class="ri"><div class="rn">2</div><div class="rt"><strong>ax.plot()</strong> para tendências e séries temporais. Suporta múltiplas séries, markers, cores e legenda.</div></div><div class="ri"><div class="rn">3</div><div class="rt"><strong>ax.bar() / ax.barh()</strong> para comparar categorias. Vertical para poucos itens, horizontal para rótulos longos.</div></div><div class="ri"><div class="rn">4</div><div class="rt"><strong>ax.hist()</strong> para distribuicao numérica. bins controla a granularidade. axvline() marca média ou limites.</div></div><div class="ri"><div class="rn">5</div><div class="rt"><strong>ax.scatter()</strong> para correlacao entre variáveis. alpha evita ocultamento com sobreposicao. df.plot() para atalhos diretos do Pandas.</div></div></div><div class="next-page"><div><div class="next-page-label">Próxima etapa</div><div class="next-page-title">▶ Demo ao Vivo — Visualizacao com Matplotlib</div></div><a class="next-page-btn" href="a08_demo_ao_vivo.html">Abrir Demo →</a></div>';}
];
function buildDots(){var b=document.getElementById('dots-bar');b.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('span');d.className='dot'+(i===0?' active':'');(function(idx){d.onclick=function(){goTo(idx);};})(i);b.appendChild(d);if(i<SLIDES.length-1){var s=document.createElement('div');s.className='dsep';b.appendChild(s);}}}
function buildSlides(){var w=document.getElementById('slide-wrap');w.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='sl-'+i;d.innerHTML=SLIDES[i]();w.appendChild(d);}}
function goTo(i){document.getElementById('sl-'+cur).classList.remove('active');var dots=document.querySelectorAll('.dot');dots[cur].classList.remove('active');if(i>cur)dots[cur].classList.add('done');cur=i;var el=document.getElementById('sl-'+cur);el.innerHTML=SLIDES[cur]();el.classList.add('active');dots[cur].classList.add('active');dots[cur].classList.remove('done');document.getElementById('btn-prev').disabled=(cur===0);var bn=document.getElementById('btn-next');bn.disabled=(cur===SLIDES.length-1);bn.textContent=cur===SLIDES.length-1?'Finalizar':'Próximo →';document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;if(!timerStarted){timerStarted=true;startTimer();}}
function goNav(d){var n=cur+d;if(n>=0&&n<SLIDES.length)goTo(n);}
function startTimer(){var r=30*60;var el=document.getElementById('timer');timerInterval=setInterval(function(){r--;var m=Math.floor(r/60),s=r%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(r<=300)el.className='timer warn';if(r<=60)el.className='timer danger';if(r<=0){clearInterval(timerInterval);el.textContent='00:00';}},1000);}
function ansQ(el,t,id){var qb=el.closest('.qb');qb.querySelectorAll('.qop').forEach(function(o){if(o===el)o.classList.add(t==='c'?'correct':'wrong');else o.classList.add('dimmed');});var fb=document.getElementById(id);if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='Nao exatamente — relembre os tipos de gráfico e quando usar cada um.';}fb.style.display='block';}
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;
</script>
