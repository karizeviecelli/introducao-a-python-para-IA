<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposição — Pandas: Lendo e Explorando Dados · Aula 09</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap}
.badge{background:#6d28d9;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:'Courier New',monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#6d28d9;transform:scale(1.4)}.dot.done{background:#c4b5fd;opacity:.6}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:22px 28px;overflow-y:auto;display:none}
.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#6d28d9;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #6d28d9}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:'Courier New',monospace;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.cm{color:#475569;font-style:italic}.fn{color:#fbbf24}
.hl{background:#f5f3ff;border-left:3px solid #6d28d9;padding:10px 13px;font-size:12.5px;color:#2e1065;line-height:1.55;margin:10px 0}
.hl strong{color:#5b21b6;font-weight:600}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0;color:#1e293b}.nb.pr{background:#6d28d9;color:#fff;border-color:#6d28d9}
.nb.pr:hover{background:#5b21b6}.nb:disabled{opacity:.35;pointer-events:none}
.nc{font-size:12px;color:#94a3b8}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:540px){.compare{grid-template-columns:1fr}}
.cs{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.csh{padding:8px 13px;font-size:12px;font-weight:600}
.csb{padding:10px 13px;font-size:12px;color:#64748b;line-height:1.7}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
.tbl th{background:#f5f3ff;color:#6d28d9;font-weight:600;padding:7px 11px;text-align:left;border-bottom:2px solid #ddd6fe}
.tbl td{padding:6px 11px;border-bottom:1px solid #f1f5f9;color:#475569}
.tbl tr:hover td{background:#f8fafc}
.qb{margin-bottom:16px}
.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;color:#1e293b;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#c4b5fd;background:#f5f3ff}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#ede9fe;color:#6d28d9;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.next-page{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 16px;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:10px}
.next-page-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#6d28d9}
.next-page-title{font-size:13px;font-weight:600;color:#1e293b;margin-top:2px}
.next-page-btn{background:#6d28d9;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.next-page-btn:hover{background:#5b21b6}
</style>
</head>

<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:11px">
      <span class="badge">Aula 09</span>
      <div><div class="hdr-title">Primeiro Modelo de ML com Scikit-learn · Exposição Dialogada</div><div class="hdr-sub">30 minutos · Projetor · Turma</div></div>

    <div class="timer" id="timer">30:00</div>
  </div>

    <button class="nb" id="btn-prev" onclick="goNav(-1)" disabled>← Anterior</button>

<script>
var cur=0,timerStarted=false,timerInterval=null;
var SLIDES=[
function(){return '<div class="ey">Abertura · 3 min</div><div class="stitle">Nosso primeiro modelo de Machine Learning</div><div class="ssub">Chegamos ao ponto de convergência de tudo que estudamos: Python, NumPy, Pandas e visualização. Agora vamos treinar um modelo que aprende padrões em dados e faz previsões.</div><div class="cards"><div class="card ac"><div class="ci">🤖</div><div class="ct">O que é ML?</div><div class="cb">Um programa que aprende padrões a partir de exemplos sem ser explicitamente programado com regras. Em vez de if/else, você mostra dados e o algoritmo descobre as regras.</div></div><div class="card ac"><div class="ci">🌸</div><div class="ct">Dataset Iris</div><div class="cb">150 flores de 3 espécies. 4 medidas: comprimento e largura de sépala e pétala. O benchmark clássico para aprender classificação.</div></div><div class="card ac"><div class="ci">🔧</div><div class="ct">Scikit-learn</div><div class="cb">A biblioteca de ML mais usada em Python. API consistente: qualquer modelo usa .fit(), .predict() e .score(). Construída sobre NumPy e Pandas.</div></div><div class="card"><div class="ci">💬</div><div class="ct">Atividade de abertura</div><div class="cb"><em>"Se eu mostrar para vocês 120 fotos de flores com rótulos e depois pedir para classificar 30 novas, vocês conseguem? Como o cérebro faz isso? O KNN faz algo similar."</em></div></div></div>';},
function(){return '<div class="ey">Conceito · 4 min</div><div class="stitle">KNN — classificação por vizinhança</div><div class="ssub">K-Nearest Neighbors é o algoritmo de ML mais intuitivo. Para classificar um novo ponto, encontra os K vizinhos mais próximos no espaço de features e vota na classe mais comum.</div><div class="cw"><div class="ch"><span>Conceito KNN — K=3</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># KNN com K=3, novo ponto</span>\n<span class="cm"># Vizinhos mais próximos:</span>\n<span class="cm">#   1: Setosa     (dist=0.2)</span>\n<span class="cm">#   2: Setosa     (dist=0.3)</span>\n<span class="cm">#   3: Versicolor (dist=0.5)</span>\n<span class="cm"># Votacao: 2x Setosa, 1x Versicolor</span>\n<span class="cm"># Previsao: Setosa</span>\n\n<span class="cm"># Parametros do KNN:</span>\n<span class="cm"># n_neighbors: quantos vizinhos votar</span>\n<span class="cm"># metric: como medir distancia</span>\n<span class="cm">#   euclidean, manhattan, minkowski</span></pre></div><div class="hl"><strong>K pequeno (K=1):</strong> modelo muito sensível ao ruído — um ponto errado muda a previsão. <strong>K grande:</strong> fronteiras mais suaves mas pode perder detalhes. K ímpar evita empate em classificação binária.</div>';},
function(){return '<div class="ey">Fluxo · 3 min</div><div class="stitle">O fluxo padrão de ML com Scikit-learn</div><div class="ssub">Todo projeto de ML segue o mesmo fluxo: carregar dados, dividir em treino/teste, treinar o modelo, prever e avaliar. Scikit-learn padroniza cada etapa com a mesma API.</div><div class="cw"><div class="ch"><span>Python · Fluxo completo em 10 linhas</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">from</span> <span class="p">sklearn.datasets</span> <span class="k">import</span> <span class="fn">load_iris</span>\n<span class="k">from</span> <span class="p">sklearn.model_selection</span> <span class="k">import</span> <span class="fn">train_test_split</span>\n<span class="k">from</span> <span class="p">sklearn.neighbors</span> <span class="k">import</span> <span class="fn">KNeighborsClassifier</span>\n<span class="k">from</span> <span class="p">sklearn.metrics</span> <span class="k">import</span> <span class="fn">accuracy_score</span>\n\n<span class="p">iris</span> = <span class="fn">load_iris</span>()\n<span class="p">X</span>, <span class="p">y</span> = <span class="p">iris</span>.<span class="fn">data</span>, <span class="p">iris</span>.<span class="fn">target</span>\n<span class="p">X_train</span>, <span class="p">X_test</span>, <span class="p">y_train</span>, <span class="p">y_test</span> = <span class="fn">train_test_split</span>(\n    <span class="p">X</span>, <span class="p">y</span>, <span class="p">test_size</span>=<span class="v">0.2</span>, <span class="p">random_state</span>=<span class="v">42</span>)\n\n<span class="p">knn</span> = <span class="fn">KNeighborsClassifier</span>(<span class="p">n_neighbors</span>=<span class="v">5</span>)\n<span class="p">knn</span>.<span class="fn">fit</span>(<span class="p">X_train</span>, <span class="p">y_train</span>)\n<span class="p">y_pred</span> = <span class="p">knn</span>.<span class="fn">predict</span>(<span class="p">X_test</span>)\n<span class="fn">print</span>(<span class="fn">accuracy_score</span>(<span class="p">y_test</span>, <span class="p">y_pred</span>))  <span class="cm"># ~0.97</span></pre></div><div class="hl"><strong>A API do Scikit-learn é sempre a mesma:</strong> .fit() para treinar, .predict() para prever, .score() para acurácia. Se amanhã trocarem KNN por RandomForest, apenas uma linha muda.</div>';},
function(){return '<div class="ey">Dados · 3 min</div><div class="stitle">Explorando o dataset Iris</div><div class="ssub">Antes de treinar qualquer modelo, sempre exploramos os dados. O Iris tem 150 amostras balanceadas de 3 classes, com 4 features numéricas contínuas.</div><div class="cw"><div class="ch"><span>Python · Explorando o Iris</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">import</span> <span class="p">pandas</span> <span class="k">as</span> <span class="p">pd</span>\n\n<span class="p">iris</span> = <span class="fn">load_iris</span>()\n<span class="fn">print</span>(<span class="p">iris</span>.<span class="fn">data</span>.<span class="fn">shape</span>)       <span class="cm"># (150, 4)</span>\n<span class="fn">print</span>(<span class="p">iris</span>.<span class="fn">feature_names</span>)\n<span class="fn">print</span>(<span class="p">iris</span>.<span class="fn">target_names</span>)\n\n<span class="p">df</span> = <span class="p">pd</span>.<span class="fn">DataFrame</span>(<span class="p">iris</span>.<span class="fn">data</span>, <span class="p">columns</span>=<span class="p">iris</span>.<span class="fn">feature_names</span>)\n<span class="p">df</span>[<span class="s">"species"</span>] = <span class="p">iris</span>.<span class="fn">target_names</span>[<span class="p">iris</span>.<span class="fn">target</span>]\n\n<span class="fn">print</span>(<span class="p">df</span>.<span class="fn">groupby</span>(<span class="s">"species"</span>).<span class="fn">mean</span>().<span class="fn">round</span>(<span class="v">2</span>))\n<span class="fn">print</span>(<span class="p">df</span>[<span class="s">"species"</span>].<span class="fn">value_counts</span>())</pre></div><div class="hl"><strong>Dataset balanceado:</strong> 50 amostras de cada classe. Isso é raro no mundo real — a maioria dos problemas tem classes desbalanceadas, onde acurácia simples pode enganar.</div>';},
function(){return '<div class="ey">Train/Test · 3 min</div><div class="stitle">train_test_split — separando treino de teste</div><div class="ssub">Treinar e avaliar no mesmo conjunto é como estudar a prova e ser avaliado com as mesmas questões — o resultado nao reflete aprendizado real.</div><div class="compare"><div class="cs"><div class="csh" style="background:#fef2f2;color:#991b1b">Errado</div><div class="csb"><code>knn.fit(X, y)</code><br><code>knn.score(X, y)</code><br><br>Avalia nos mesmos dados do treino. O modelo decorou. Acurácia artificialmente alta.</div></div><div class="cs"><div class="csh" style="background:#f5f3ff;color:#2e1065">Correto</div><div class="csb"><code>X_train, X_test, y_train, y_test</code><br><code>= train_test_split(X, y, test_size=0.2)</code><br><br>Treina em 80%, avalia em 20% nunca vistos. Mede generalização real.</div></div></div><div class="cw"><div class="ch"><span>Python · Parametros do split</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="p">X_train</span>, <span class="p">X_test</span>, <span class="p">y_train</span>, <span class="p">y_test</span> = <span class="fn">train_test_split</span>(\n    <span class="p">X</span>, <span class="p">y</span>,\n    <span class="p">test_size</span>    = <span class="v">0.2</span>,  <span class="cm"># 20% para teste</span>\n    <span class="p">random_state</span> = <span class="v">42</span>,  <span class="cm"># reproducibilidade</span>\n    <span class="p">stratify</span>     = <span class="p">y</span>    <span class="cm"># manter proporcao de classes</span>\n)\n<span class="fn">print</span>(<span class="p">X_train</span>.<span class="fn">shape</span>)  <span class="cm"># (120, 4)</span>\n<span class="fn">print</span>(<span class="p">X_test</span>.<span class="fn">shape</span>)   <span class="cm"># (30, 4)</span></pre></div>';},
function(){return '<div class="ey">Métricas · 3 min</div><div class="stitle">Avaliando o modelo — além da acurácia</div><div class="ssub">Acurácia é o percentual de previsões corretas. Para problemas com classes balanceadas como o Iris é suficiente. O relatório de classificação vai além.</div><div class="cw"><div class="ch"><span>Python · Metricas de avaliação</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">from</span> <span class="p">sklearn.metrics</span> <span class="k">import</span> (\n    <span class="fn">accuracy_score</span>, <span class="fn">classification_report</span>, <span class="fn">confusion_matrix</span>\n)\n\n<span class="p">y_pred</span> = <span class="p">knn</span>.<span class="fn">predict</span>(<span class="p">X_test</span>)\n\n<span class="fn">print</span>(<span class="s">f"Acuracia: {accuracy_score(y_test, y_pred):.2%}"</span>)\n\n<span class="fn">print</span>(<span class="fn">classification_report</span>(\n    <span class="p">y_test</span>, <span class="p">y_pred</span>,\n    <span class="p">target_names</span>=<span class="p">iris</span>.<span class="fn">target_names</span>\n))\n\n<span class="fn">print</span>(<span class="fn">confusion_matrix</span>(<span class="p">y_test</span>, <span class="p">y_pred</span>))</pre></div><div class="hl"><strong>Precision:</strong> das previsões positivas, quantas eram corretas? <strong>Recall:</strong> de todos os positivos reais, quantos foram acertados? <strong>F1:</strong> média harmônica — equilibra precision e recall.</div>';},
function(){return '<div class="ey">Hiperparâmetros · 3 min</div><div class="stitle">Escolhendo o K certo</div><div class="ssub">K é um hiperparâmetro — nao é aprendido, mas escolhido por nós. Testamos diferentes valores e escolhemos o que performa melhor no conjunto de teste.</div><div class="cw"><div class="ch"><span>Python · Busca pelo melhor K</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">import</span> <span class="p">numpy</span> <span class="k">as</span> <span class="p">np</span>\n<span class="k">import</span> <span class="p">matplotlib.pyplot</span> <span class="k">as</span> <span class="p">plt</span>\n\n<span class="p">k_vals</span>   = <span class="fn">range</span>(<span class="v">1</span>, <span class="v">21</span>)\n<span class="p">acuracias</span> = []\n\n<span class="k">for</span> <span class="p">k</span> <span class="k">in</span> <span class="p">k_vals</span>:\n    <span class="p">m</span> = <span class="fn">KNeighborsClassifier</span>(<span class="p">n_neighbors</span>=<span class="p">k</span>)\n    <span class="p">m</span>.<span class="fn">fit</span>(<span class="p">X_train</span>, <span class="p">y_train</span>)\n    <span class="p">acuracias</span>.<span class="fn">append</span>(<span class="p">m</span>.<span class="fn">score</span>(<span class="p">X_test</span>, <span class="p">y_test</span>))\n\n<span class="p">melhor_k</span> = <span class="p">k_vals</span>[<span class="p">np</span>.<span class="fn">argmax</span>(<span class="p">acuracias</span>)]\n<span class="fn">print</span>(<span class="s">f"Melhor K={melhor_k}: {max(acuracias):.2%}"</span>)\n\n<span class="p">plt</span>.<span class="fn">plot</span>(<span class="p">k_vals</span>, <span class="p">acuracias</span>, <span class="p">marker</span>=<span class="s">"o"</span>, <span class="p">color</span>=<span class="s">"#6d28d9"</span>)\n<span class="p">plt</span>.<span class="fn">xlabel</span>(<span class="s">"K"</span>); <span class="p">plt</span>.<span class="fn">ylabel</span>(<span class="s">"Acuracia"</span>)\n<span class="p">plt</span>.<span class="fn">title</span>(<span class="s">"K vs Acuracia"</span>); <span class="p">plt</span>.<span class="fn">show</span>()</pre></div>';},
function(){return '<div class="ey">Quiz · 3 min</div><div class="stitle">Verificação de aprendizagem</div><div class="ssub">Turma responde junto.</div><div class="qb"><div class="qa">1. Por que devemos separar os dados em treino e teste antes de treinar o modelo?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>A</span>Para economizar memória ao treinar</div><div class="qop" onclick="ansQ(this,\'c\',\'f0\')"><span>B</span>Para avaliar se o modelo generaliza para dados novos, nao vistos</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>C</span>Porque o Scikit-learn exige essa separação</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>D</span>Para treinar mais rápido com menos dados</div></div><div class="qfb" id="f0" style="background:#f0fdf4;color:#15803d">Correto! Avaliar no treino dá acurácia artificialmente alta — o modelo decorou. O conjunto de teste simula dados do mundo real nunca vistos.</div></div><div class="qb"><div class="qa">2. O que .fit(X_train, y_train) faz especificamente no KNN?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'c\',\'f1\')"><span>A</span>Armazena os dados de treino para consulta durante a previsão</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>B</span>Calcula equações matemáticas complexas de otimização</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>C</span>Normaliza os dados automaticamente</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>D</span>Divide os dados em grupos por classe</div></div><div class="qfb" id="f1" style="background:#f0fdf4;color:#15803d">Correto! KNN é lazy — nao aprende equações. O fit apenas memoriza X_train e y_train. Na previsão, calcula distâncias para todos os pontos de treino e vota nos K mais próximos.</div></div>';},
function(){return '<div class="ey">Encerramento · 1 min</div><div class="stitle">Recapitulando</div><div class="ssub">O que aprendemos e o que faremos agora.</div><div class="rl"><div class="ri"><div class="rn">1</div><div class="rt"><strong>KNN classifica por vizinhança:</strong> encontra os K pontos de treino mais próximos e vota na classe majoritária. K é um hiperparâmetro que escolhemos.</div></div><div class="ri"><div class="rn">2</div><div class="rt"><strong>Fluxo Scikit-learn:</strong> load → train_test_split → instanciar → .fit() → .predict() → avaliar. Todo modelo usa a mesma API — trocar KNN por outro modelo muda uma linha.</div></div><div class="ri"><div class="rn">3</div><div class="rt"><strong>Nunca avalie no treino.</strong> train_test_split separa 20% para teste. stratify=y mantém proporção de classes em ambos os conjuntos.</div></div><div class="ri"><div class="rn">4</div><div class="rt"><strong>Métricas:</strong> accuracy_score, classification_report e confusion_matrix. Precision, recall e F1 mostram onde o modelo acerta e onde erra por classe.</div></div><div class="ri"><div class="rn">5</div><div class="rt"><strong>Hiperparâmetros:</strong> testamos K de 1 a 20 e escolhemos o melhor pelo desempenho no teste — esse processo se chama busca de hiperparâmetros.</div></div></div><div class="next-page"><div><div class="next-page-label">Próxima etapa</div><div class="next-page-title">▶ Demo ao Vivo — Primeiro Modelo de ML com Scikit-learn</div></div><a class="next-page-btn" href="a09_demo_ao_vivo.html">Abrir Demo →</a></div>';}
];
function buildDots(){var b=document.getElementById('dots-bar');b.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('span');d.className='dot'+(i===0?' active':'');(function(idx){d.onclick=function(){goTo(idx);};})(i);b.appendChild(d);if(i<SLIDES.length-1){var s=document.createElement('div');s.className='dsep';b.appendChild(s);}}}
function buildSlides(){var w=document.getElementById('slide-wrap');w.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='sl-'+i;d.innerHTML=SLIDES[i]();w.appendChild(d);}}
function goTo(i){document.getElementById('sl-'+cur).classList.remove('active');var dots=document.querySelectorAll('.dot');dots[cur].classList.remove('active');if(i>cur)dots[cur].classList.add('done');cur=i;var el=document.getElementById('sl-'+cur);el.innerHTML=SLIDES[cur]();el.classList.add('active');dots[cur].classList.add('active');dots[cur].classList.remove('done');document.getElementById('btn-prev').disabled=(cur===0);var bn=document.getElementById('btn-next');bn.disabled=(cur===SLIDES.length-1);bn.textContent=cur===SLIDES.length-1?'Finalizar':'Próximo →';document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;if(!timerStarted){timerStarted=true;startTimer();}}
function goNav(d){var n=cur+d;if(n>=0&&n<SLIDES.length)goTo(n);}
function startTimer(){var r=30*60;var el=document.getElementById('timer');timerInterval=setInterval(function(){r--;var m=Math.floor(r/60),s=r%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(r<=300)el.className='timer warn';if(r<=60)el.className='timer danger';if(r<=0){clearInterval(timerInterval);el.textContent='00:00';}},1000);}
function ansQ(el,t,id){var qb=el.closest('.qb');qb.querySelectorAll('.qop').forEach(function(o){if(o===el)o.classList.add(t==='c'?'correct':'wrong');else o.classList.add('dimmed');});var fb=document.getElementById(id);if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='Nao exatamente — relembre train_test_split e a API KNN.';}fb.style.display='block';}
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;
</script>
